<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Architecture: the browser loads the single-file SPA and config from ClickHouse, signs in to your OAuth IdP with Authorization-Code + PKCE, then sends every query to ClickHouse with a Bearer id_token that ClickHouse validates against the IdP's JWKS. There is no app-specific backend.">
  <defs>
    <linearGradient id="gBrowser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0091CE"/><stop offset="1" stop-color="#0079AD"/>
    </linearGradient>
    <linearGradient id="gIdp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B6BFF"/><stop offset="1" stop-color="#7C5CFC"/>
    </linearGradient>
    <linearGradient id="gCh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD740"/><stop offset="1" stop-color="#FFC400"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="ahViolet" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#7C5CFC"/></marker>
    <marker id="ahBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#0079AD"/></marker>
    <marker id="ahTeal" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#0E9E97"/></marker>
    <marker id="ahGray" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L8,4 L0,8 Z" fill="#94A3B8"/></marker>
  </defs>

  <!-- backing card -->
  <rect x="10" y="12" width="920" height="476" rx="20" fill="#FBFCFE" stroke="#E3E8EF"/>
  <text x="40" y="46" fill="#94A3B8" font-size="11" font-weight="700" letter-spacing="2">AUTH &amp; DATA FLOW</text>

  <!-- ===== arrows (drawn first, under the nodes' labels) ===== -->
  <!-- (1) browser <-> IdP : OAuth2 + PKCE -->
  <path d="M214,176 C 240,132 292,120 344,120" fill="none" stroke="#7C5CFC" stroke-width="2.4"
        marker-start="url(#ahViolet)" marker-end="url(#ahViolet)"/>
  <text x="132" y="110" text-anchor="middle" fill="#6D4DF6" font-size="13" font-weight="600">① OAuth2 + PKCE</text>
  <text x="132" y="129" text-anchor="middle" fill="#8B7BC9" font-size="11.5">↳ returns id_token</text>

  <!-- (4) ClickHouse -> IdP : validate via JWKS (dashed) -->
  <path d="M708,150 C 700,116 656,107 600,106" fill="none" stroke="#94A3B8" stroke-width="1.8"
        stroke-dasharray="5 4" marker-end="url(#ahGray)"/>
  <text x="612" y="132" fill="#94A3B8" font-size="11" font-weight="600">JWKS</text>

  <!-- (2) browser -> ClickHouse : GET the SPA + config -->
  <path d="M304,248 L 632,236" fill="none" stroke="#0079AD" stroke-width="2.4" marker-end="url(#ahBlue)"/>
  <text x="470" y="226" fill="#0079AD" font-size="13" font-weight="600" text-anchor="middle">② GET /sql · /sql/config.json</text>

  <!-- (3) browser -> ClickHouse : run every query -->
  <path d="M304,330 L 632,320" fill="none" stroke="#0E9E97" stroke-width="2.4" marker-end="url(#ahTeal)"/>
  <text x="470" y="350" fill="#0B857F" font-size="13" font-weight="600" text-anchor="middle">③ POST / · Bearer id_token</text>
  <text x="470" y="367" fill="#5B8C89" font-size="11" text-anchor="middle">— sent on every query —</text>

  <!-- ===== Browser node ===== -->
  <g filter="url(#card)">
    <rect x="56" y="176" width="248" height="232" rx="14" fill="#FFFFFF" stroke="#D7DEE8"/>
    <path d="M56,190 a14,14 0 0 1 14,-14 h220 a14,14 0 0 1 14,14 v32 h-248 Z" fill="url(#gBrowser)"/>
  </g>
  <rect x="76" y="190" width="17" height="13" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.6"/>
  <line x1="76" y1="196" x2="93" y2="196" stroke="#FFFFFF" stroke-width="1.6"/>
  <text x="104" y="204" fill="#FFFFFF" font-size="13" font-weight="700" letter-spacing="1.5">BROWSER</text>
  <text x="78" y="252" fill="#0F172A" font-size="15" font-weight="600">Altinity SQL Browser</text>
  <text x="78" y="273" fill="#64748B" font-size="12.5">single served HTML · no backend</text>
  <rect x="78" y="286" width="204" height="26" rx="13" fill="#E8F3F9" stroke="#B9DDEE"/>
  <text x="180" y="303" fill="#06699A" font-size="12" font-weight="600" text-anchor="middle">sessionStorage · id_token</text>
  <text x="78" y="338" fill="#64748B" font-size="12.5">signs in with your IdP;</text>
  <text x="78" y="356" fill="#64748B" font-size="12.5">never holds a static credential</text>
  <text x="78" y="384" fill="#94A3B8" font-size="11.5" font-style="italic">ClickHouse sees the user's JWT</text>

  <!-- ===== OAuth IdP node ===== -->
  <g filter="url(#card)">
    <rect x="346" y="44" width="250" height="120" rx="14" fill="#FFFFFF" stroke="#D9D2F6"/>
    <path d="M346,58 a14,14 0 0 1 14,-14 h222 a14,14 0 0 1 14,14 v28 h-250 Z" fill="url(#gIdp)"/>
  </g>
  <path d="M372,73 a7,7 0 1 0 0.01,0 M366,73 v-3 a6,6 0 0 1 12,0 v3" fill="none" stroke="#FFFFFF" stroke-width="1.6"/>
  <text x="390" y="78" fill="#FFFFFF" font-size="13" font-weight="700" letter-spacing="1.2">OAUTH IdP · OIDC</text>
  <text x="368" y="112" fill="#0F172A" font-size="13.5" font-weight="600">Authorization-Code + PKCE</text>
  <text x="368" y="132" fill="#64748B" font-size="12">OIDC discovery · any provider</text>
  <text x="368" y="150" fill="#64748B" font-size="12">issues + silently refreshes tokens</text>

  <!-- ===== ClickHouse node ===== -->
  <g filter="url(#card)">
    <rect x="636" y="150" width="252" height="258" rx="14" fill="#FFFFFF" stroke="#EAD9A0"/>
    <path d="M636,164 a14,14 0 0 1 14,-14 h224 a14,14 0 0 1 14,14 v32 h-252 Z" fill="url(#gCh)"/>
  </g>
  <g fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round">
    <line x1="658" y1="172" x2="658" y2="186"/><line x1="664" y1="168" x2="664" y2="186"/>
    <line x1="670" y1="174" x2="670" y2="186"/><line x1="676" y1="170" x2="676" y2="186"/>
  </g>
  <text x="688" y="178" fill="#1A1A1A" font-size="13" font-weight="700" letter-spacing="1.2">CLICKHOUSE</text>

  <text x="656" y="220" fill="#94A3B8" font-size="10.5" font-weight="700" letter-spacing="1">HTTP HANDLERS · STATIC</text>
  <text x="656" y="240" fill="#0F172A" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">GET /sql → the SPA</text>
  <text x="656" y="259" fill="#0F172A" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">GET /sql/config.json</text>
  <line x1="656" y1="274" x2="868" y2="274" stroke="#EEF2F6" stroke-width="1.5"/>
  <text x="656" y="296" fill="#94A3B8" font-size="10.5" font-weight="700" letter-spacing="1">QUERY ENDPOINT</text>
  <text x="656" y="316" fill="#0F172A" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">POST / — runs every query</text>
  <line x1="656" y1="331" x2="868" y2="331" stroke="#EEF2F6" stroke-width="1.5"/>
  <text x="656" y="353" fill="#94A3B8" font-size="10.5" font-weight="700" letter-spacing="1">JWT VALIDATION</text>
  <text x="656" y="373" fill="#0F172A" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">token_processor · JWKS</text>
  <text x="656" y="391" fill="#64748B" font-size="12">or a delegated verifier</text>

  <!-- footer caption -->
  <text x="470" y="456" fill="#475569" font-size="13" text-anchor="middle">No app-specific backend — only ClickHouse's HTTP handlers and your OAuth provider.</text>
</svg>

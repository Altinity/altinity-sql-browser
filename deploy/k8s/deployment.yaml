apiVersion: v1
kind: ConfigMap
metadata:
  name: sql-browser-config
data:
  # The deployment's OAuth/host config, served at /sql/config.json. Replace with
  # your own IdP + cluster entries (see deploy/config.json.example). NOTE: if the
  # config carries non-public OAuth client secrets, use a Secret instead of a
  # ConfigMap and mount it the same way.
  config.json: |
    {
      "basic_login": true,
      "idps": [
        {
          "id": "google",
          "label": "Google",
          "issuer": "https://accounts.google.com",
          "client_id": "REPLACE_WITH_OAUTH_CLIENT_ID"
        }
      ],
      "hosts": [
        { "label": "my-cluster", "url": "https://clickhouse.example.com", "auth": "oauth", "idp": "google" }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altinity-sql-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: altinity-sql-browser
  template:
    metadata:
      labels:
        app: altinity-sql-browser
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101          # nginx-unprivileged
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sql-browser
          image: ghcr.io/altinity/altinity-sql-browser:latest
          imagePullPolicy: IfNotPresent
          # CSP connect-src: IdP endpoints + the ClickHouse cluster origins the
          # browser POSTs to cross-origin. Must match your config.json hosts.
          env:
            - name: CONNECT_SRC
              value: "https://accounts.google.com https://oauth2.googleapis.com https://clickhouse.example.com"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /sql/config.json
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /config/config.json
              subPath: config.json
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: sql-browser-config
# Optional hardening: set readOnlyRootFilesystem: true on the container and add
# emptyDir mounts for /tmp, /var/cache/nginx, /var/run, and /etc/nginx/conf.d
# (the nginx entrypoint writes the envsubst-rendered config there at startup).
---
apiVersion: v1
kind: Service
metadata:
  name: altinity-sql-browser
spec:
  selector:
    app: altinity-sql-browser
  ports:
    - name: http
      port: 8080
      targetPort: http

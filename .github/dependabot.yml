# Dependency update alerts/PRs. Runtime dependencies are inlined into the
# shipped dist/sql.html, so a vulnerability in them ships to every browser that
# loads the page — keep them watched alongside dev dependencies and Actions.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

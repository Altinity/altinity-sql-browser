<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>editor harness</title>
  <!-- the real stylesheet, so .sql-textarea / .sql-pre lay out exactly as shipped -->
  <link rel="stylesheet" href="/src/styles.css" />
  <style>
    html, body { margin: 0; background: #111; }
    /* .sql-editor is height/width:100%, so the mount host needs a fixed box. */
    #host { width: 680px; height: 340px; }
  </style>
</head>
<body data-theme="dark">
  <div id="host"></div>
  <!-- Mount the real editor module with a minimal stub controller. No bundling:
       the browser resolves the /src ESM graph directly. -->
  <!-- Resolve the bare `@preact/signals-core` specifier that src/state.js imports.
       esbuild inlines it for the shipped artifact; raw ESM in the browser needs
       this map (the e2e server serves the repo root, so /node_modules is live). -->
  <script type="importmap">
    { "imports": { "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs" } }
  </script>
  <script type="module">
    import { createTextareaEditor } from '/src/editor/textarea-adapter.js';
    import { createState, activeTab } from '/src/state.js';

    const state = createState({ loadStr: (k, d) => d, loadJSON: (k, d) => d });
    const app = { state, dom: {}, document };
    window.__app = app;
    const port = createTextareaEditor(app);
    // Mirror app.js's onDocChange subscriber (#143) so the harness tab tracks
    // the view — without it, a syncFromState()/re-mount in a spec would snap
    // ta.value back to the tab's stale (empty) sql.
    port.onDocChange((value) => {
      const tab = activeTab(state);
      tab.sql = value;
      tab.dirty = true;
    });
    port.mount(document.getElementById('host'));

    // Expose the real insertion primitives the schema double-clicks use, so the
    // e2e can drive them synchronously (inside a real dblclick handler) — that's
    // the gesture/selection context where Firefox's execCommand path misbehaves.
    window.__insertAtCursor = (t) => port.insertAtCursor(t);
    window.__replaceEditor = (t) => port.replaceDocument(t);

    // Set editor content the way typing/replace does (drives paint()).
    window.__setSql = (sql) => {
      const ta = app.dom.editorTextarea;
      ta.value = sql;
      ta.dispatchEvent(new Event('input', { bubbles: true }));
    };
    window.__ready = true;
  </script>
</body>
</html>

name: Rework examples

on:
  push:
    branches: [examples-rework-bootstrap]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate-and-verify:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[examples migrated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: examples-rework-bootstrap
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Patch one-time generator rewrite
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('examples/mjs/rewrite-example-generators.mjs')
          lines = path.read_text().splitlines()
          result_hits = 0
          filter_hits = 0
          for i, line in enumerate(lines):
              if 'expect(result.ok, result.ok ? name :' in line:
                  lines[i] = "  expect(result.ok, result.ok ? name : name + ': ' + result.diagnostics.map((d) => d.message).join('; ')).toBe(true);"
                  result_hits += 1
              elif 'expect(filterExecution(query.sql).diagnostics,' in line:
                  lines[i] = "        expect(filterExecution(query.sql).diagnostics, name + ':' + query.id).toEqual([]);"
                  filter_hits += 1
          if result_hits != 1 or filter_hits != 1:
              raise SystemExit(f'expected one result and filter patch, got {result_hits} and {filter_hits}')
          path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Rewrite generators and tests
        run: |
          if ! node examples/mjs/rewrite-example-generators.mjs > /tmp/rewrite.log 2>&1; then
            cat /tmp/rewrite.log
            exit 1
          fi
      - name: Patch generated test regex
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/unit/spec-examples.test.js')
          lines = path.read_text().splitlines()
          start = next((i for i, line in enumerate(lines) if 'const snippets = [...source.matchAll(' in line), None)
          if start is None:
              raise SystemExit('generated markdown regex was not found')
          end = start
          while end < len(lines) and 'JSON.parse(match[1]));' not in lines[end]:
              end += 1
          if end >= len(lines):
              raise SystemExit('generated markdown regex end was not found')
          replacement = r"      const snippets = [...source.matchAll(/```json\n([\s\S]*?)```/g)].map((match) => JSON.parse(match[1]));"
          lines[start:end + 1] = [replacement]
          path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Upload rewrite diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: rewrite-diagnostics
          path: /tmp/rewrite.log
      - name: Normalize checked-in examples
        run: node examples/mjs/normalize-examples.mjs
      - name: Verify normalization
        run: node examples/mjs/normalize-examples.mjs --check
      - name: Test
        run: |
          if ! npm test > /tmp/test.log 2>&1; then
            cat /tmp/test.log
            exit 1
          fi
      - name: Upload test diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-diagnostics
          path: /tmp/test.log
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Boundaries
        run: npm run check:arch
      - name: Build
        run: npm run build
      - name: Commit migrated examples
        if: ${{ success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add examples tests/unit/spec-examples.test.js
          git commit -m "docs(examples): migrate to portable dashboard bundles [examples migrated]"
          git push origin HEAD:examples-rework-bootstrap

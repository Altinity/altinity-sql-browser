# Dependency update alerts/PRs. The two runtime deps (Chart.js, @dagrejs/dagre)
# are inlined into the shipped dist/sql.html, so a vuln in them ships to every
# browser that loads the page — keep them watched, alongside devDeps and Actions.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    # Defer the Vitest 4 migration: @vitest/coverage-v8 v4 measures coverage
    # differently and drops the suite below the 100%/90% per-file gate even with
    # all tests passing. Stay on 2.x (and matching happy-dom) until that migration
    # is done deliberately; minors/patches still flow.
    ignore:
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/coverage-v8"
        update-types: ["version-update:semver-major"]
      - dependency-name: "happy-dom"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

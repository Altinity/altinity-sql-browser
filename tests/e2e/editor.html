<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>editor harness</title>
  <!-- the real stylesheet, so the CM6 editor lays out exactly as shipped -->
  <link rel="stylesheet" href="/src/styles.css" />
  <style>
    html, body { margin: 0; background: #111; }
    /* the app mounts into a sized editor-region; give the host the same box */
    #host, #spec-host { width: 680px; height: 340px; }
    #host .cm-editor, #spec-host .cm-editor { height: 100%; }
    #spec-host { display: none; }
  </style>
</head>
<body data-theme="dark">
  <div id="host"></div>
  <div id="spec-host"></div>
  <!-- CSS cascade probe for the shipped editor toolbar. `.tb-btn` and
       `.run-btn` set explicit display values, so the app's `hidden` attributes
       need an author rule that still wins in every browser engine. -->
  <div id="spec-toolbar-probe" class="ed-toolbar" data-editor-mode="spec">
    <button class="run-btn" hidden>Run</button>
    <button class="tb-btn" hidden>SQL Format</button>
    <button class="tb-btn" hidden>Explain</button>
    <button class="tb-btn spec-action">Format</button>
    <button class="tb-btn save-btn">Save</button>
    <div class="editor-mode-switch"><button class="editor-mode-btn">SQL</button><button class="editor-mode-btn active">Spec</button></div>
    <button class="tb-btn" hidden>Export</button>
    <button class="tb-btn" hidden>Share</button>
  </div>
  <!-- Mount the real CM6 adapter with a minimal stub controller. No bundling:
       the browser resolves the /src ESM graph directly, so every bare
       specifier the graph imports needs an import-map entry (the #89
       unbundled-harness gotcha) — esbuild inlines these for the shipped
       artifact. -->
  <script type="importmap">
    { "imports": {
      "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs",
      "@codemirror/state": "/node_modules/@codemirror/state/dist/index.js",
      "@codemirror/view": "/node_modules/@codemirror/view/dist/index.js",
      "@codemirror/commands": "/node_modules/@codemirror/commands/dist/index.js",
      "@codemirror/lang-json": "/node_modules/@codemirror/lang-json/dist/index.js",
      "@codemirror/language": "/node_modules/@codemirror/language/dist/index.js",
      "@codemirror/lang-sql": "/node_modules/@codemirror/lang-sql/dist/index.js",
      "@codemirror/lang-xml": "/node_modules/@codemirror/lang-xml/dist/index.js",
      "@codemirror/autocomplete": "/node_modules/@codemirror/autocomplete/dist/index.js",
      "@codemirror/search": "/node_modules/@codemirror/search/dist/index.js",
      "@lezer/common": "/node_modules/@lezer/common/dist/index.js",
      "@lezer/highlight": "/node_modules/@lezer/highlight/dist/index.js",
      "@lezer/lr": "/node_modules/@lezer/lr/dist/index.js",
      "@lezer/json": "/node_modules/@lezer/json/dist/index.js",
      "@lezer/xml": "/node_modules/@lezer/xml/dist/index.js",
      "style-mod": "/node_modules/style-mod/src/style-mod.js",
      "w3c-keyname": "/node_modules/w3c-keyname/index.js",
      "crelt": "/node_modules/crelt/index.js",
      "@marijn/find-cluster-break": "/node_modules/@marijn/find-cluster-break/src/index.js"
    } }
  </script>
  <script type="module">
    import { createCodeMirrorEditor } from '/src/editor/codemirror-adapter.js';
    import { createSpecEditor } from '/src/editor/spec-editor.js';
    import { createSpecCompletionSources } from '/src/editor/spec-completion-adapter.js';
    import { createCodeViewer } from '/src/editor/code-viewer.js';
    import { openDocEntry } from '/src/ui/doc-pane.js';
    import { createState, activeTab, newTabObj } from '/src/state.js';
    import { assembleReferenceData, buildCompletions } from '/src/core/completions.js';
    import { createQuerySpecValidationService } from '/src/core/spec-schema.js';

    const state = createState({ loadStr: (k, d) => d, loadJSON: (k, d) => d });
    const refData = assembleReferenceData(null);
    // #313 canned version-exact entry (mirrors a real 26.6 system.functions row).
    window.__docFixtures = {
      sum: {
        target: { kind: 'aggregate-function', name: 'sum' },
        title: 'sum', signature: 'sum(x)',
        summary: 'Calculates the sum of the values.',
        introducedIn: '1.1.0', categories: ['Aggregate Functions'],
        description: 'Calculates the sum of the values. Works only for numbers.',
        returnedValue: 'The sum of the values.',
        examples: 'SELECT sum(x) FROM t',
        deterministic: true, higherOrder: false,
      },
    };
    const app = {
      state, dom: {}, document,
      // #276 Phase 5: the CM6 adapter reads the reference data through
      // `app.catalog.*` (the SchemaCatalogService member) — this harness
      // mirrors that shape with a writable plain object (editor-cm6.spec.js
      // reassigns `catalog.completions` to test dynamic sources).
      // #313: `docSummary`/`docEntry` replace the old `entityDoc(name)` seam.
      // The harness serves one canned rich entry ('sum') so editor-docs.spec.js
      // can exercise the found path (hover upgrade, pane rendering); every
      // other name resolves `missing`, matching a live server's no-match.
      catalog: {
        refData, completions: buildCompletions(refData, []),
        docSummary: async (target) => {
          const e = window.__docFixtures[target.name.toLowerCase()];
          if (!e) return { status: 'missing' };
          const { target: t, title, signature, summary, introducedIn, aliasTo } = e;
          return { status: 'found', value: { target: t, title, signature, summary, ...(introducedIn && { introducedIn }), ...(aliasTo && { aliasTo }) } };
        },
        docEntry: async (target) => {
          const e = window.__docFixtures[target.name.toLowerCase()];
          return e ? { status: 'found', value: e } : { status: 'missing' };
        },
      },
      prefs: { save() {} },
      CodeViewer: (opts) => createCodeViewer(opts),
      specValidators: createQuerySpecValidationService(),
      specCompletionSources: createSpecCompletionSources(),
    };
    // Mirror app.ts's wiring (#313): the adapter opens the reference pane
    // through this injected action, never by importing ui/doc-pane itself.
    app.openDocEntry = (target) => openDocEntry(app, target);
    window.__app = app;
    const port = createCodeMirrorEditor(app);
    window.__port = port;
    // Mirror app.js's onDocChange subscriber (#143) so the harness tab tracks
    // the view — without it, a syncFromState() in a spec would snap the doc
    // back to the tab's stale (empty) sql.
    port.onDocChange((value) => {
      const tab = activeTab(state);
      tab.sqlDraft = value;
      tab.dirtySql = true;
    });
    port.mount(document.getElementById('host'));
    const specPort = createSpecEditor(app);
    window.__specPort = specPort;
    specPort.onDocChange((value) => {
      const tab = activeTab(state);
      tab.specText = value;
      tab.dirtySpec = true;
    });
    specPort.mount(document.getElementById('spec-host'));
    window.__newTab = (id) => newTabObj(id);
    window.__showSpec = () => {
      document.getElementById('host').style.display = 'none';
      document.getElementById('spec-host').style.display = 'block';
      specPort.requestMeasure();
      specPort.focus();
    };

    // The real insertion primitives the schema double-clicks use, so specs can
    // drive them synchronously inside a real gesture handler.
    window.__insertAtCursor = (t) => port.insertAtCursor(t);
    window.__replaceEditor = (t) => port.replaceDocument(t);
    window.__setSql = (sql) => port.replaceDocument(sql);
    // #213 viewer probe: mount into an iframe document to exercise the real
    // browser's cross-document adoption/root path (happy-dom unit tests cover
    // the same contract without a second Window realm).
    window.__mountViewer = (options = {}) => {
      const frame = document.createElement('iframe');
      document.body.appendChild(frame);
      const targetDocument = frame.contentDocument;
      const parent = targetDocument.createElement('div');
      targetDocument.body.appendChild(parent);
      const viewer = createCodeViewer({
        parent,
        document: targetDocument,
        text: 'one\ntwo',
        language: 'text',
        wrap: false,
        ...options,
      });
      window.__viewer = viewer;
      window.__viewerFrame = frame;
      return true;
    };
    window.__ready = true;
  </script>
</body>
</html>

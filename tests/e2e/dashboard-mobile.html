<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dashboard mobile harness</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <script type="importmap">
    {
      "imports": {
        "@preact/signals-core": "/node_modules/@preact/signals-core/dist/signals-core.mjs"
      }
    }
  </script>
</head>
<body data-theme="dark">
  <div id="root">
    <div class="dash-page">
      <div class="dash-topbar">
        <div id="shared-header"></div>
        <div class="dash-contextbar">
          <div class="dash-title">A deliberately long production operations Dashboard name</div>
          <span class="dash-chip dash-fav">6 favorites</span>
          <div class="dash-layout-wrap">
            <select class="result-panel-select dash-layout-select" aria-label="Dashboard style" title="Dashboard style">
              <option value="grafana-grid">Grid Tiles</option>
              <option value="full">Full view</option>
              <option value="report" selected>Report</option>
              <option value="columns-2">2 columns</option>
              <option value="columns-3">3 columns</option>
            </select>
          </div>
          <div class="dash-spacer" style="flex:1"></div>
          <span class="dash-updated">Updated 12:34</span>
          <button class="dash-btn dash-refresh" title="Re-run all tiles" aria-label="Refresh dashboard">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor"><path d="M10.5 6a4.5 4.5 0 1 1-1.3-3.2M10.5 1.5V4H8" /></svg>
            <span class="dash-refresh-label">Refresh</span>
          </button>
        </div>
        <div class="dash-toolbar has-filters">
          <div class="dash-filter-host"><div class="dash-filters" role="group" aria-label="Dashboard filters"></div></div>
        </div>
      </div>
      <div id="no-filter-toolbar" class="dash-toolbar">Empty toolbar (no filters)</div>
      <main class="dash-grid is-report" aria-label="Dashboard panels">
        <section class="dash-tile"><div class="dash-tile-head">Panel one</div></section>
        <section class="dash-tile"><div class="dash-tile-head">Panel two</div></section>
        <section class="dash-tile"><div class="dash-tile-head">Panel three</div></section>
        <section class="dash-tile"><div class="dash-tile-head">Panel four</div></section>
      </main>
    </div>
  </div>
  <script type="module">
    import { buildRecentField } from '/src/ui/recent-field.js';
    import { buildRelativeTimeField } from '/src/ui/relative-time-field.js';
    import { buildTimeRangeField } from '/src/ui/time-range-field.js';
    import { parseParamType } from '/src/core/param-type.js';
    import { wireComboInput } from '/src/ui/combobox.js';
    import { buildAppHeader } from '/src/ui/app-header.js';

    const dashboardFileButton = document.createElement('button');
    dashboardFileButton.className = 'hd-file-btn dash-file-btn';
    dashboardFileButton.textContent = 'File';
    const headerApp = {
      document,
      dom: {},
      state: {
        serverVersion: '26.3.1',
        theme: 'dark',
        workspaceKey: 'production_operations',
        libraryName: { value: 'Production operations' },
        libraryDirty: { value: false },
      },
      currentWorkspace: {
        key: 'production_operations',
      },
      sqlRoute: {
        surface: 'dashboard',
        workspaceKey: 'production_operations',
        mode: 'edit',
      },
      conn: {
        host: () => 'clickhouse.example.internal',
        email: () => 'me@example.com',
      },
      actions: {
        openUserMenu: () => {},
        openShortcuts: () => {},
        openDashboard: () => {},
      },
      toggleTheme: () => {},
      navigateSqlRoute: async () => {},
      editingLibrary: false,
    };
    document.querySelector('#shared-header').replaceWith(
      buildAppHeader(headerApp, { dashboardFileButton }),
    );

    const filters = document.querySelector('.dash-filters');
    // 'version' is the one optional field here — real coverage for the bold
    // (required) vs muted (optional) `.var-name` contrast (2026-07-18: replaced
    // the leading "*" glyph).
    const OPTIONAL = new Set(['version']);
    for (const name of ['region', 'service', 'environment', 'owner', 'status', 'version']) {
      const field = buildRecentField({
        document, name, type: 'String', value: '', baseTitle: `${name}: String`,
        getRecents: (text) => ['alpha', 'beta', 'gamma'].filter((value) => value.includes(text.toLowerCase())),
        onClearRecent: () => {}, onValueInput: () => {}, onCommit: () => {},
      });
      wireComboInput(field, { onValueInput: () => {}, onCommit: () => {} });
      const label = document.createElement('label');
      label.className = 'var-field' + (OPTIONAL.has(name) ? ' is-optional' : '');
      label.innerHTML = `<span class="var-name">${name}</span>`;
      label.append(field.el);
      filters.append(label);
    }
    // A relative-time field's resolved-value preview line (#294 review finding)
    // makes this field taller than the plain recent-value fields above — real
    // coverage for the focused-field padding/clipping fix.
    const timeField = buildRelativeTimeField({
      document, name: 'since', type: 'DateTime', value: 'now', baseTitle: 'since: DateTime',
      wallNow: () => Date.parse('2026-07-18T12:00:00Z'),
      getRecents: () => [], onClearRecent: () => {}, onValueInput: () => {}, onCommit: () => {},
    });
    wireComboInput(timeField, { onValueInput: () => {}, onCommit: () => {} });
    const timeLabel = document.createElement('label');
    timeLabel.className = 'var-field';
    timeLabel.innerHTML = '<span class="var-name">since</span>';
    timeLabel.append(timeField.el);
    filters.append(timeLabel);

    // #335: one compound time-range control, built through the same leaf builder
    // the filter bar uses (`buildTimeRangeField`), in its own "Time" section —
    // real coverage that the wrapped/scrolled mobile bar layout includes the
    // compound control without clipping, and that its wide resolved-range
    // trigger sits on the same field row as the plain fields.
    const trWall = Date.parse('2026-07-18T12:00:00Z');
    const trField = buildTimeRangeField({
      document,
      group: {
        key: 'mob-from\u0000mob-to',
        fromFilterId: 'mob-from', toFilterId: 'mob-to',
        fromParameter: 'from', toParameter: 'to',
        fromType: parseParamType('DateTime'), toType: parseParamType('DateTime'),
      },
      fromValue: '-1d', toValue: 'now', active: true,
      waveNowMs: trWall, wallNow: () => trWall,
      getRecents: () => [], onApply: () => {},
    });
    const trSep = document.createElement('span');
    trSep.className = 'trf-sep'; trSep.setAttribute('aria-hidden', 'true');
    const trHeading = document.createElement('span');
    trHeading.className = 'flabel'; trHeading.textContent = 'Time';
    // Append the section (label, control, separator) to the row — same leaf-
    // append style as every other field in this hand-built harness, and it
    // leaves the existing fields' positions (region first) untouched so the
    // pre-#335 layout assertions keep measuring exactly what they did before.
    filters.append(trHeading);
    filters.append(trField.el);
    filters.append(trSep);

    window.__prefs = { dashLayout: 'report', dashCols: 3 };
    localStorage.setItem('asb:dashLayout', 'report');
    localStorage.setItem('asb:dashCols', '3');
    window.__layoutApplyCount = 0;
    window.__setLayout = (mode) => {
      // #321: 'full-width'/'wide' removed — every mode this harness exercises
      // is a flow preset (report/columns-2/columns-3).
      const grid = document.querySelector('.dash-grid');
      grid.classList.toggle('is-report', mode === 'report');
      grid.style.setProperty('--dash-cols', mode === 'columns-2' ? '2' : '3');
      window.__layoutApplyCount++;
    };

    window.__refreshCount = 0;
    const refresh = document.querySelector('.dash-refresh');
    refresh.addEventListener('click', () => {
      refresh.disabled = true;
      window.__refreshCount++;
      setTimeout(() => { refresh.disabled = false; }, 80);
    });
    window.__ready = true;
  </script>
</body>
</html>
